simulation:
  params:
      dt: 0.01

dynamic_model:
  name: bicycle
  params:
    wheelbase : 2
    rear_wheel_to_center : 1.2
    max_acceleration: 1
    min_acceleration: 1.2
    max_velocity : 300
    lock_to_lock_steering : 1.4
observation_conf:
  state_observer:
    name: base_state_observer
    observed_state:
      - x
      - y
      - heading
      - velocity
      - slip_angle
      - steering
      - alp
  track_observer:
    - lateral_proportion
    - relative_heading
  track_description:
    num_points: 10
    stride: 2

track_selection:
  track_controller:
    name: local_list_controller
    params:
      list_path: data/track_list.yaml
  track_sampler:
    name: round_robin
    params:
      {}
