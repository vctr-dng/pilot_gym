vehicle_model_conf:
  - name: "bicycle"
  - vehicle_params:
    - "wheelbase"
    - "rear_wheel_to_center"
    - "max_acceleration"
    - "min_acceleration"
    - "max_velocity"
    - "lock_to_lock_steering"
observation_conf:
  - vehicle_model:
    - "x"
    - "y"
    - "heading"
    - "velocity"
    - "slip_angle"
    - "steering"
  - track_observer:
    - "lateral_proportion"
    - "relative_heading"
  - track_description:
    - num_points: 10
    - stride: 2
